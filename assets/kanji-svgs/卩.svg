<svg id="z21353" class="acjk" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<style>

@keyframes zk {
	to {
		stroke-dashoffset:0;
	}
}
svg.acjk path[clip-path] {
	--t:0.8s;
	animation:zk var(--t) linear forwards var(--d);
	stroke-dasharray:3337;
	stroke-dashoffset:3339;
	stroke-width:128;
	stroke-linecap:round;
	fill:none;
	stroke:#000;
}
svg.acjk path[id] {fill:#ccc;}


    @keyframes guide-fade {
        0% { opacity: 0; }
        3% { opacity: 1; }
        95% { opacity: 1; }
        100% { opacity: 0; }
    }

    svg.acjk #guide-arrow {
        fill: #f77;
    }

    svg.acjk .guides {
        circle {
            fill: #0f6;
        }

        path {
            opacity: 0;
            animation: guide-fade var(--t) linear forwards var(--d);
            stroke-width: 16px;
            stroke-linecap: round;
            stroke: #f77;
            fill: none;
            marker-end: url(#guide-arrow);
        }

        circle,
        path {
            --t: 0.8s;
            opacity: 0;
            animation: guide-fade calc(var(--t) + 0.4s) ease-in-out forwards calc(var(--d) - 0.2s);
        }
    }
</style>
