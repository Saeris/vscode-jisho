name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Publish
    # Guard against forks running the publish flow.
    if: github.repository == 'Saeris/vscode-jisho'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "lts"
          cache: true

      # Release precondition: the extension downloads its dictionary from the rolling
      # `dictionary-latest` release on first run, so refuse to publish a .vsix whose required
      # artifacts don't exist yet — otherwise every new install gets a broken first run. The data
      # workflow (dictionary.yml) publishes those artifacts on a schema change; this gate makes the
      # ordering a hard precondition rather than a race.
      - name: Verify dictionary artifacts exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: vp exec node scripts/check-data-release.ts

      # Bumpy runs the per-package build/publish commands from package.json's `bumpy` block:
      # package-platforms.ts builds one .vsix per target (each with its matching @tursodatabase
      # native binary), then publish-vsix.ts publishes every target to the Marketplace + Open VSX.
      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          # Personal access token for the VS Code Marketplace publisher.
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          # Personal access token for Open VSX (open-vsx.org).
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          # Yarn 4 corrupts the tarball path Bumpy captures from stdout if
          # color codes are enabled. NO_COLOR alone is not enough for Yarn 4.
          NO_COLOR: "1"
          YARN_ENABLE_COLORS: "false"
